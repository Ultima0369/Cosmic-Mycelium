name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio

      - name: Run physics anchor tests (P0 gate)
        run: |
          echo "🔬 Physics Anchor Gate — energy drift must be < 0.1%"
          python -m pytest tests/physics/ -v --tb=short
        continue-on-error: false

      - name: Run full test suite
        run: |
          echo "🧪 Full test run with coverage"
          python -m pytest tests/ -v --tb=short --cov=cosmic_mycelium --cov-report=term-missing
        env:
          PYTEST_ADDOPTS: "--tb=short"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit security scan
        run: |
          echo "🔒 Security scan (bandit)"
          bandit -r cosmic_mycelium/ -f json -o bandit-report.json
          # Fail CI on HIGH or CRITICAL severity issues
          if [ -f bandit-report.json ]; then
            HIGH_COUNT=$(jq '[.[] | select(.issue_severity == "HIGH" or .issue_severity == "CRITICAL")] | length' bandit-report.json 2>/dev/null || echo 0)
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "❌ Found $HIGH_COUNT HIGH/CRITICAL security issue(s). Failing CI."
              jq -r '.[] | select(.issue_severity == "HIGH" or .issue_severity == "CRITICAL") | "  - \(.test_name): \(.issue_text) (file: \(.filename):\(.line_number))"' bandit-report.json
              exit 1
            fi
            echo "✅ No HIGH/CRITICAL security issues found."
          fi

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dev tools
        run: |
          pip install black ruff mypy
      - name: Black format check
        run: black --check cosmic_mycelium/ tests/
      - name: Ruff lint
        run: ruff check cosmic_mycelium/ tests/
      - name: MyPy type check (non-blocking)
        run: mypy cosmic_mycelium/ --ignore-missing-imports || true

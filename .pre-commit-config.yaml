# pre-commit configuration for Cosmic Mycelium
# Factory-grade quality gate — all checks must pass before commit

repos:
  # ============================================================================
  # 1. Meta: pre-commit hooks themselves
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: detect-private-key
      - id: debug-statements
      - id: destroyed-symlinks
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: [--fix=lf]

  # ============================================================================
  # 2. Code formatting: Black (uncompromising)
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.13
        args: [--config=pyproject.toml]
        require_serial: true  # black needs exclusive access to the cache

  # ============================================================================
  # 3. Import sorting: isort (black-compatible)
  # ============================================================================
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: isort (python)
        args: [--settings-file=pyproject.toml]
        files: \.py$

  # ============================================================================
  # 4. Linting & complexity: Ruff (all-in-one)
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.10
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        name: ruff (format check)
        types_or: [python, pyi, jupyter]

  # ============================================================================
  # 5. Type checking: mypy (strict mode)
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        name: mypy (strict)
        additional_dependencies: [
          types-redis>=5.0.0,
          types-pyyaml>=6.0.0,
        ]
        args: [
          --config-file=pyproject.toml,
          --install-types,
          --non-interactive,
        ]
        exclude: ^tests/fixtures/
        require_serial: false

  # ============================================================================
  # 6. Spell checking: codespell (catch typos in code & docs)
  # ============================================================================
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [
          --ignore-words-list=cosmic,infant,hic,mycelium,slime,sympnet,
          --skip=*.ipynb,
          --quiet-level=2,
        ]

  # ============================================================================
  # 7. Security: bandit (basic security linting)
  # ============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, cosmic_mycelium/]
        additional_dependencies: ["bandit[toml]"]

  # ============================================================================
  # 8. Commit message validation: commitlint
  # ============================================================================
  - repo: https://github.com/commit-check/commitlint
    rev: v0.1.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        args: [--config=commitlint.config.js]

  # ============================================================================
  # 9. Secret detection: detect-secrets (local scanner)
  # ============================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  # ============================================================================
  # 10. Yaml/JSON schema validation
  # ============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--format, parsable, -c, .yamllint]

  # ============================================================================
  # 11. Documentation linting (optional, light)
  # ============================================================================
  - repo: https://github.com/PyCQA/doc8
    rev: v1.1.2
    hooks:
      - id: doc8
        args: [--max-line-length=88]
        files: ^docs/
        additional_dependencies: []

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [codespell]
  submodules: false

# Cosmic Mycelium — Docker Compose for development & cluster deployment
# Three profiles: dev (single infant), cluster (multi-node), full (with observability stack)

services:
  # ============================================================================
  # Shared networks
  # ============================================================================
  mycelium-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

  # ============================================================================
  # Redis — Fast in-memory message bus for intra-node communication
  # ============================================================================
  redis:
    image: redis:7.4-alpine@sha256:a21b5c2ac62f55d84e787530a2d040259a0891d8a1b5d75b78d8f657f
    container_name: cm-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - mycelium-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Kafka — Persistent event streaming for cross-cluster sync
  # ============================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cm-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - mycelium-network
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Prometheus — Metrics collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: cm-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - mycelium-network
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Grafana — Metrics visualization
  # ============================================================================
  grafana:
    image: grafana/grafana:11.6.1
    container_name: cm-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ''
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - mycelium-network
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Jaeger — Distributed tracing
  # ============================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.64
    container_name: cm-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    networks:
      - mycelium-network
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686/api/services"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Infant Application — Single Silicon Infant Node
  # ============================================================================
  infant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cm-infant
    hostname: infant
    networks:
      mycelium-network:
        ipv4_address: 10.10.0.10
    environment:
      # Core identity
      COSMIC_ENV: ${COSMIC_ENV:-development}
      INFANT_ID: ${INFANT_ID:-infant-001}
      INFANT_NODE_ROLE: ${INFANT_NODE_ROLE:-standalone}  # standalone/cluster/global

      # HIC energy management
      INFANT_ENERGY_MAX: ${INFANT_ENERGY_MAX:-100.0}
      INFANT_CONTRACT_DURATION: ${INFANT_CONTRACT_DURATION:-0.055}
      INFANT_DIFFUSE_DURATION: ${INFANT_DIFFUSE_DURATION:-0.005}
      INFANT_SUSPEND_DURATION: ${INFANT_SUSPEND_DURATION:-5.0}
      INFANT_RECOVERY_ENERGY: ${INFANT_RECOVERY_ENERGY:-60.0}
      INFANT_RECOVERY_RATE: ${INFANT_RECOVERY_RATE:-0.5}

      # Physics anchor thresholds
      PHYSICS_ENERGY_DRIFT_MAX: ${PHYSICS_ENERGY_DRIFT_MAX:-0.001}
      PHYSICS_ADAPTATION_THRESHOLD: ${PHYSICS_ADAPTATION_THRESHOLD:-0.001}

      # Service endpoints
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}

      # Observability
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: ${METRICS_PORT:-8000}
      HEALTH_PORT: ${HEALTH_PORT:-8001}

      # Data persistence
      COSMIC_MYCELIUM_DATA_DIR: /app/data
      COSMIC_MYCELIUM_LOG_DIR: /app/logs
    volumes:
      - infant-data:/app/data
      - infant-logs:/app/logs
      - infant-checkpoints:/app/checkpoints
    ports:
      - "8000:8000"   # Metrics endpoint
      - "8001:8001"   # Health check endpoint
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from cosmic_mycelium.infant.main import SiliconInfant; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - dev
      - cluster
      - full

  # ============================================================================
  # Volume definitions
  # ============================================================================
  volumes:
    redis-data:
      driver: local
    kafka-data:
      driver: local
    prometheus-data:
      driver: local
    grafana-data:
      driver: local
    infant-data:
      driver: local
    infant-logs:
      driver: local
    infant-checkpoints:
      driver: local

# ============================================================================
# Named networks
# ============================================================================
networks:
  mycelium-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
          gateway: 10.10.0.1

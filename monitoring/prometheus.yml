# Cosmic Mycelium — Prometheus Configuration
# Scrapes metrics from infant nodes and infrastructure components.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cosmic-mycelium'
    environment: '${ENVIRONMENT:-development}'

# Alertmanager configuration (uncomment when alertmanager deployed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files
rule_files:
  - '/etc/prometheus/rules/*.yml'
  - '/etc/prometheus/rules/rules.yml'

# Scrape configurations
scrape_configs:
  # ============================================================================
  # Prometheus self-monitoring
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          role: 'monitoring'

  # ============================================================================
  # Infant node metrics (direct scraping)
  # ============================================================================
  - job_name: 'infant-nodes'
    honor_labels: true
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infant:8000']
        labels:
          service: 'infant'
          node_id: '${INFANT_ID:-unknown}'
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.*):.*'
        replacement: '${1}'
        target_label: 'instance'

  # ============================================================================
  # Redis metrics (uncomment when redis-exporter deployed)
  # ============================================================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis:9121']
  #       labels:
  #         service: 'redis'
  #         instance: 'redis-master'
  #   metrics_path: '/metrics'

  # ============================================================================
  # Kafka metrics (uncomment when kafka-exporter deployed)
  # ============================================================================
  # - job_name: 'kafka'
  #   static_configs:
  #     - targets: ['kafka:9308']
  #       labels:
  #         service: 'kafka'
  #         instance: 'kafka-broker'
  #   metrics_path: '/metrics'

  # ============================================================================
  # Node Manager API (uncomment when node-manager deployed)
  # ============================================================================
  # - job_name: 'node-manager'
  #   static_configs:
  #     - targets: ['node-manager:5000']
  #       labels:
  #         service: 'node-manager'
  #         role: 'control-plane'
  #   metrics_path: '/metrics'

  # ============================================================================
  # Custom Physics Validator (uncomment when endpoint available)
  # ============================================================================
  # - job_name: 'physics-validator'
  #   static_configs:
  #     - targets: ['infant:8001']
  #       labels:
  #         service: 'physics'
  #         role: 'validation'
  #   metrics_path: '/physics/metrics'

